<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">

    <div class="container-fluid">

        <span class="navbar-brand">
            Student Dashboard
        </span>

        <a th:href="@{/logout}" class="btn btn-danger">
            Logout
        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-success text-white">

            <h3>My Profile</h3>

        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <tr>
                    <th>ID</th>
                    <td th:text="${student.id}"></td>
                </tr>

                <tr>
                    <th>First Name</th>
                    <td th:text="${student.firstName}"></td>
                </tr>

                <tr>
                    <th>Last Name</th>
                    <td th:text="${student.lastName}"></td>
                </tr>

                <tr>
                    <th>Department</th>
                    <td th:text="${student.department}"></td>
                </tr>

                <tr>
                    <th>Year</th>
                    <td th:text="${student.year}"></td>
                </tr>

                <tr>
                    <th>Gender</th>
                    <td th:text="${student.gender}"></td>
                </tr>

                <tr>
                    <th>Place</th>
                    <td th:text="${student.place}"></td>
                </tr>

                <tr>
                    <th>Email</th>
                    <td th:text="${student.email}"></td>
                </tr>

                <tr>
                    <th>Phone</th>
                    <td th:text="${student.phone}"></td>
                </tr>

                <tr>
                    <th>Total Fee</th>
                    <td th:text="${student.totalFee}"></td>
                </tr>

                <tr>
                    <th>Paid Fee</th>
                    <td th:text="${student.paidFee}"></td>
                </tr>

                <tr>
                    <th>Balance Fee</th>
                    <td th:text="${student.balanceFee}"></td>
                </tr>
                <tr>
    					<th>Password</th>
    					<td th:text="${student.password}"></td>
			</tr>

            </table>

        </div>

    </div>

</div>

</body>
</html>
