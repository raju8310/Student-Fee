<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container-fluid">

        <span class="navbar-brand">
            Student Management System
        </span>

        <a th:href="@{/logout}" class="btn btn-danger">
            Logout
        </a>

    </div>

</nav>

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">

        <h2>Students</h2>

        <a th:href="@{/admin/add}" class="btn btn-success">
            Add Student
        </a>

    </div>

    <form th:action="@{/admin/search}" method="get">

        <div class="input-group mb-3">

            <input type="text"
                   name="name"
                   class="form-control"
                   placeholder="Search Student">

            <button class="btn btn-primary">
                Search
            </button>

        </div>

    </form>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">

        <tr>

            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Year</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Total Fee</th>
            <th>Paid Fee</th>
            <th>Balance Fee</th>
            <th>Actions</th>

        </tr>

        </thead>

        <tbody>

        <tr th:each="student : ${students}">

            <td th:text="${student.id}"></td>

            <td th:text="${student.firstName}"></td>

            <td th:text="${student.department}"></td>

            <td th:text="${student.year}"></td>

            <td th:text="${student.email}"></td>

            <td th:text="${student.phone}"></td>

            <td th:text="${student.totalFee}"></td>

            <td th:text="${student.paidFee}"></td>

            <td th:text="${student.balanceFee}"></td>

            <td>

                <a th:href="@{/admin/edit/{id}(id=${student.id})}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a th:href="@{/admin/delete/{id}(id=${student.id})}"
                   class="btn btn-danger btn-sm">
                    Delete
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
