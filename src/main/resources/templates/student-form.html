<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Student Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/css/style.css}">

</head>
<body>

<script>

function validateForm() {

    let firstName = document.getElementById("firstName").value;
    let totalFee = document.getElementById("totalFee").value;
    let paidFee = document.getElementById("paidFee").value;


    document.getElementById("nameError").innerHTML = "";
    document.getElementById("feeError").innerHTML = "";
    document.getElementById("paidError").innerHTML = "";


    let isValid = true;


    if(firstName.trim() === "") {
        document.getElementById("nameError").innerHTML =
            "First Name is required";
        isValid = false;
    }


    if(totalFee === "" || totalFee <= 0) {
        document.getElementById("feeError").innerHTML =
            "Enter valid total fee";
        isValid = false;
    }


    if(paidFee === "" || paidFee < 0) {
        document.getElementById("paidError").innerHTML =
            "Enter valid paid fee";
        isValid = false;
    }


    if(Number(paidFee) > Number(totalFee)) {
        document.getElementById("paidError").innerHTML =
            "Paid fee cannot be greater than total fee";
        isValid = false;
    }


    return isValid;
}

</script>

 <div class="container mt-5">

    <div class="card">

        <div class="card-header bg-primary text-white">
            <h3>Add Student</h3>
        </div>

        <div class="card-body">

<form th:action="@{/admin/save}" 
      th:object="${student}" 
      method="post"
      onsubmit="return validateForm()">
                <input type="hidden" th:field="*{id}">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label>First Name</label>
                        <input type="text" th:field="*{firstName}" class="form-control">
                        
                            <span id="nameError" class="text-danger"></span>
                        
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Last Name</label>
                        <input type="text" th:field="*{lastName}" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Department</label>
                        <input type="text" th:field="*{department}" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Year</label>
                        <input type="text" th:field="*{year}" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
    <label class="form-label d-block">Gender</label>

    <div class="form-check form-check-inline">
        <input class="form-check-input"
               type="radio"
               th:field="*{gender}"
               value="Male"
               id="male">

        <label class="form-check-label" for="male">Male</label>
    </div>

    <div class="form-check form-check-inline">
        <input class="form-check-input"
               type="radio"
               th:field="*{gender}"
               value="Female"
               id="female">

        <label class="form-check-label" for="female">Female</label>
    </div>

    <div class="form-check form-check-inline">
        <input class="form-check-input"
               type="radio"
               th:field="*{gender}"
               value="Other"
               id="other">

        <label class="form-check-label" for="other">Other</label>
    </div>
</div>
<div class="col-md-4 mb-3">
    <label class="form-label">Place</label>

    <select th:field="*{place}" class="form-select">
        <option value="">-- Select Place --</option>
        <option value="Bangalore">Bangalore</option>
        <option value="Mysore">Mysore</option>
        <option value="Davanagere">Davanagere</option>
        <option value="Karwar">Karwar</option>
        <option value="Hubli">Hubli</option>
        <option value="Belagavi">Belagavi</option>
        <option value="Shivamogga">Shivamogga</option>
        <option value="Mangalore">Mangalore</option>
    </select>
</div>
                    <div class="col-md-6 mb-3">
                        <label>Email</label>
                        <input type="email" th:field="*{email}" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label>Phone</label>
                        <input type="text" th:field="*{phone}" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Total Fee</label>
                        <input type="number" th:field="*{totalFee}" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Paid Fee</label>
                        <input type="number" th:field="*{paidFee}" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label>Balance Fee</label>
                        <input type="number" th:field="*{balanceFee}" class="form-control" readonly>
                    </div>
                    <div class="col-md-4 mb-3">
    				<label>Password</label>
    			<input type="password" th:field="*{password}" class="form-control">
					</div>

                </div>

                <button type="submit" class="btn btn-success">
                   Submit
                </button>

                <a th:href="@{/admin/dashboard}" class="btn btn-secondary">
                    Back
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
